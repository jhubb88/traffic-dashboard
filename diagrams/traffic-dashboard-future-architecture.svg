<!-- Caption -->
<text x="510" y="340" text-anchor="middle" font-size="9.5" fill="#9ca3af">Texas Traffic Dashboard — Planned Architecture (not deployed) · CloudFront HTTPS · Lambda proxy for live TxDOT data · CloudWatch monitoring</text>
