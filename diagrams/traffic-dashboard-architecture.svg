<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="520" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="15" font-weight="800" fill="#1a1a2e">Texas Traffic Dashboard — Current Architecture</text>
  <text x="500" y="56" text-anchor="middle" font-size="11" fill="#6b7280">Deployed: S3 Static Website · All logic client-side · No backend</text>

  <!-- BROWSER -->
  <rect x="400" y="76" width="200" height="56" rx="10" fill="#1a1a2e" stroke="#334155" stroke-width="1.5"/>
  <text x="500" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">🌐 User Browser</text>
  <text x="500" y="118" text-anchor="middle" font-size="10" fill="#94a3b8">Chrome / Firefox / Safari</text>

  <!-- Arrow: Browser → S3 -->
  <line x1="500" y1="132" x2="500" y2="164" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="512" y="152" font-size="9" fill="#64748b">HTTPS request</text>

  <!-- S3 Static Website -->
  <rect x="350" y="164" width="300" height="64" rx="10" fill="#0f3460" stroke="#1e5799" stroke-width="1.5"/>
  <text x="500" y="188" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">🪣 AWS S3 Static Website</text>
  <text x="500" y="204" text-anchor="middle" font-size="10" fill="#94a3b8">jimmy-traffic-dashboard · us-east-1</text>
  <text x="500" y="218" text-anchor="middle" font-size="10" fill="#64748b">index.html (30KB · all CSS + JS inline)</text>

  <!-- Arrow: S3 → App box -->
  <line x1="500" y1="228" x2="500" y2="258" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- App Layer Box -->
  <rect x="80" y="258" width="840" height="80" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="180" y="280" text-anchor="middle" font-size="10" font-weight="700" fill="#475569" text-decoration="uppercase">Client-Side App (Vanilla JS)</text>

  <!-- MapManager -->
  <rect x="100" y="286" width="140" height="36" rx="7" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
  <text x="170" y="301" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">MapManager</text>
  <text x="170" y="315" text-anchor="middle" font-size="9" fill="#64748b">Leaflet init · tiles · markers</text>

  <!-- SidebarManager -->
  <rect x="260" y="286" width="140" height="36" rx="7" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
  <text x="330" y="301" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">SidebarManager</text>
  <text x="330" y="315" text-anchor="middle" font-size="9" fill="#64748b">counts · filters · search · list</text>

  <!-- DataSources -->
  <rect x="420" y="286" width="140" height="36" rx="7" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
  <text x="490" y="301" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">DataSources</text>
  <text x="490" y="315" text-anchor="middle" font-size="9" fill="#64748b">cascade · normalize · fallback</text>

  <!-- SimulatedData -->
  <rect x="580" y="286" width="140" height="36" rx="7" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
  <text x="650" y="301" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">SimulatedData</text>
  <text x="650" y="315" text-anchor="middle" font-size="9" fill="#64748b">40-incident pool · stable IDs</text>

  <!-- RefreshManager -->
  <rect x="740" y="286" width="140" height="36" rx="7" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
  <text x="810" y="301" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">RefreshManager</text>
  <text x="810" y="315" text-anchor="middle" font-size="9" fill="#64748b">45s interval · countdown · manual</text>

  <!-- EXTERNAL DEPENDENCIES -->
  <!-- Leaflet CDN -->
  <line x1="170" y1="258" x2="170" y2="228" stroke="#64748b" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowgray)"/>

  <!-- Arrow DataSources → APIs -->
  <line x1="490" y1="338" x2="490" y2="370" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CDN dependencies row -->
  <!-- Leaflet CDN -->
  <rect x="80" y="392" width="160" height="50" rx="8" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="160" y="412" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">📦 Leaflet.js CDN</text>
  <text x="160" y="428" text-anchor="middle" font-size="9" fill="#6b7280">unpkg.com · v1.9.4</text>
  <text x="160" y="440" text-anchor="middle" font-size="9" fill="#6b7280">Map rendering library</text>

  <!-- OpenStreetMap -->
  <rect x="260" y="392" width="160" height="50" rx="8" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="340" y="412" text-anchor="middle" font-size="11" font-weight="700" fill="#4338ca">🗺️ OpenStreetMap</text>
  <text x="340" y="428" text-anchor="middle" font-size="9" fill="#6b7280">tile.openstreetmap.org</text>
  <text x="340" y="440" text-anchor="middle" font-size="9" fill="#6b7280">Map tiles · free · no key</text>

  <!-- TxDOT 511 CORS blocked -->
  <rect x="440" y="392" width="160" height="50" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="520" y="412" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">🚧 TxDOT 511 API</text>
  <text x="520" y="428" text-anchor="middle" font-size="9" fill="#9a3412">drivetexas.org · 511tx.org</text>
  <text x="520" y="440" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">⛔ CORS blocked on S3</text>

  <!-- SF Bay 511 CORS blocked -->
  <rect x="620" y="392" width="160" height="50" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="700" y="412" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">🚧 SF Bay 511 API</text>
  <text x="700" y="428" text-anchor="middle" font-size="9" fill="#9a3412">api.511.org · free key</text>
  <text x="700" y="440" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">⛔ CORS blocked on S3</text>

  <!-- Demo fallback -->
  <rect x="800" y="392" width="160" height="50" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="880" y="412" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">✅ Demo Mode</text>
  <text x="880" y="428" text-anchor="middle" font-size="9" fill="#15803d">40-incident local pool</text>
  <text x="880" y="440" text-anchor="middle" font-size="9" fill="#15803d">Always succeeds · no network</text>

  <!-- Connector lines to bottom row -->
  <line x1="160" y1="370" x2="160" y2="392" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowgray)"/>
  <line x1="340" y1="370" x2="340" y2="392" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowgray)"/>
  <line x1="520" y1="370" x2="520" y2="392" stroke="#f97316" stroke-width="1.5" marker-end="url(#arroworange)"/>
  <line x1="700" y1="370" x2="700" y2="392" stroke="#f97316" stroke-width="1.5" marker-end="url(#arroworange)"/>
  <line x1="880" y1="370" x2="880" y2="392" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowgreen)"/>

  <!-- Cascade label -->
  <text x="500" y="380" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Data source cascade: TxDOT → SF 511 → Demo (first success wins · 3s timeout per source)</text>

  <!-- Legend -->
  <rect x="80" y="466" width="840" height="40" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="100" y="479" width="12" height="12" rx="2" fill="#fff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="118" y="490" font-size="10" fill="#475569">CDN / External dependency</text>
  <rect x="260" y="479" width="12" height="12" rx="2" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="278" y="490" font-size="10" fill="#475569">API (CORS blocked — see production arch)</text>
  <rect x="490" y="479" width="12" height="12" rx="2" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="508" y="490" font-size="10" fill="#475569">Guaranteed fallback (local data)</text>
  <rect x="680" y="479" width="12" height="12" rx="2" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="698" y="490" font-size="10" fill="#475569">JS module (client-side)</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowgray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arroworange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrowgreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
