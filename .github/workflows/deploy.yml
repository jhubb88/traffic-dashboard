name: Deploy to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy traffic-dashboard
        run: |
          aws s3 sync . s3://jimmy-traffic-dashboard/ --delete \
            --exclude ".git/*" --exclude ".github/*" \
            --exclude "*.md" --exclude "LICENSE" --exclude ".gitignore" \
            --exclude ".superpowers/*" --exclude "bucket-policy.json" \
            --exclude "diagrams/*" --exclude "docs/*"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E3H1V6C42HG9P1 --paths "/*"
